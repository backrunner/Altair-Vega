name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  native:
    name: Native ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
        env:
          ALTAIR_VEGA_DEFAULT_RENDEZVOUS: wss://tools.elfile4138.moe/altair-vega/__altair_vega_rendezvous
      - name: Package artifact
        shell: bash
        run: scripts/release-artifacts.sh "dist/release-${{ runner.os }}-${{ runner.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: altair-vega-${{ runner.os }}-${{ runner.arch }}
          path: dist/release-${{ runner.os }}-${{ runner.arch }}/*

  browser:
    name: Browser Static Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - uses: Swatinem/rust-cache@v2
      - run: cargo install wasm-pack --locked
      - run: npm ci
        working-directory: web/frontend
      - run: npm run build:wasm:release
        working-directory: web/frontend
      - run: npm run build
        working-directory: web/frontend
      - name: Archive frontend
        run: tar -czf altair-vega-web-dist.tar.gz LICENSE web/frontend/dist
      - name: Checksum frontend archive
        run: sha256sum altair-vega-web-dist.tar.gz > altair-vega-web-dist.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: altair-vega-web-dist
          path: |
            altair-vega-web-dist.tar.gz
            altair-vega-web-dist.tar.gz.sha256

  github-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native, browser]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
